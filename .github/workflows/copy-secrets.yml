name: Copy secrets to awesometree

on:
  repository_dispatch:
    types: [copy-secrets]

jobs:
  copy:
    runs-on: ubuntu-24.04
    steps:
      - name: Copy HOMEBREW_TAP_GITHUB_TOKEN
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          SECRET_VALUE: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: echo "${SECRET_VALUE}" | gh secret set HOMEBREW_TAP_GITHUB_TOKEN --repo aleksclark/awesometree

      - name: Copy AUR_SSH_KEY
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          SECRET_VALUE: ${{ secrets.AUR_SSH_KEY }}
        run: echo "${SECRET_VALUE}" | gh secret set AUR_SSH_KEY --repo aleksclark/awesometree
