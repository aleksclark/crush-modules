name: Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout crush-modules
        uses: actions/checkout@v4

      - name: Checkout crush-plugin-poc
        uses: actions/checkout@v4
        with:
          repository: aleksclark/crush
          ref: crush-modules-base
          path: crush-plugin-poc

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: crush-plugin-poc/go.mod
          cache-dependency-path: |
            go.sum
            ping/go.sum
            otlp/go.sum
            agent-status/go.sum
            periodic-prompts/go.sum
            subagents/go.sum
            tempotown/go.sum
            tavily/go.sum

      - name: Update go.mod replacements for CI
        run: |
          for mod in acp ping otlp agent-status periodic-prompts subagents tempotown tavily; do
            cd $mod
            go mod edit -replace github.com/charmbracelet/crush=../crush-plugin-poc
            go mod edit -replace github.com/aleksclark/crush-modules=../
            cd ..
          done

      - name: Run Go plugin unit tests
        run: |
          for mod in acp ping otlp agent-status periodic-prompts subagents tempotown tavily; do
            echo "=== Testing $mod ==="
            cd $mod && go test -v ./... && cd ..
          done

      - name: Run Go SDK tests
        run: cd sdks/go && go test -v ./...

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: sdks/typescript/package-lock.json

      - name: Run TypeScript SDK tests
        run: |
          cd sdks/typescript
          npm ci
          npx vitest run

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Python SDK tests
        run: |
          cd sdks/python
          pip install -e ".[dev]"
          pytest -v
